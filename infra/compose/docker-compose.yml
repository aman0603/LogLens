version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: loglens
      POSTGRES_PASSWORD: loglens
      POSTGRES_DB: loglens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../../
      dockerfile: Dockerfile.python
      args:
        SERVICE_DIR: ./apps/api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://loglens:loglens@postgres:5432/loglens

  log-producer:
    build:
      context: ../../
      dockerfile: Dockerfile.python
      args:
        SERVICE_DIR: ./apps/log-producer
    depends_on:
      - kafka

  storage-consumer:
    build:
      context: ../../
      dockerfile: Dockerfile.python
      args:
        SERVICE_DIR: ./apps/storage-consumer
    depends_on:
      - kafka
      - postgres
    environment:
      DATABASE_URL: postgresql://loglens:loglens@postgres:5432/loglens

volumes:
  postgres_data:
