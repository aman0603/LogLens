global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api'
    static_configs:
      - targets: ['api:8000']
  - job_name: 'ai-service'
    static_configs:
      - targets: ['ai-service:8000']
  - job_name: 'incident-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['incident-service:8000']
  - job_name: 'storage-consumer'
    metrics_path: /metrics
    static_configs:
      - targets: ['storage-consumer:8000']
  - job_name: 'embedding-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['embedding-service:8000']
  - job_name: 'log-producer'
    metrics_path: /metrics
    static_configs:
      - targets: ['log-producer:8000']
